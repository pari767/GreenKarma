<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GreenKarma – My Impact</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Inter',sans-serif;background:#0d1f35;min-height:100vh;color:#fff;padding-bottom:90px;}

    /* NAV */
    .navbar{background:rgba(10,38,64,0.95);backdrop-filter:blur(12px);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;border-bottom:1px solid rgba(255,255,255,0.06);}
    .nav-logo{display:flex;align-items:center;gap:8px;text-decoration:none;}
    .nav-logo-icon{width:32px;height:32px;background:#02C39A;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;}
    .nav-logo-text{color:#fff;font-size:18px;font-weight:800;letter-spacing:-0.4px;}
    .nav-logo-text span{color:#02C39A;}
    .nav-credits-pill{background:rgba(2,195,154,0.12);border:1px solid rgba(2,195,154,0.25);border-radius:99px;padding:6px 14px;font-size:13px;font-weight:700;color:#02C39A;}
    .nav-avatar{width:34px;height:34px;background:linear-gradient(135deg,#028090,#02C39A);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;}

    .page{max-width:560px;margin:0 auto;padding:20px 16px;}
    .page-title{font-size:24px;font-weight:900;letter-spacing:-0.8px;margin-bottom:4px;}
    .page-sub{color:#64748B;font-size:13px;margin-bottom:20px;}

    /* HERO IMPACT CARD */
    .impact-hero{background:linear-gradient(135deg,#012a1e 0%,#0A2640 50%,#0f3460 100%);border:1px solid rgba(2,195,154,0.2);border-radius:24px;padding:28px;margin-bottom:16px;position:relative;overflow:hidden;}
    .impact-hero::before{content:'🌍';position:absolute;right:-10px;bottom:-20px;font-size:120px;opacity:0.08;}
    .ih-label{color:#9ECFCC;font-size:12px;font-weight:600;letter-spacing:0.5px;margin-bottom:6px;}
    .ih-big{font-size:56px;font-weight:900;color:#02C39A;letter-spacing:-2px;line-height:1;margin-bottom:4px;}
    .ih-unit{font-size:18px;color:#9ECFCC;font-weight:600;}
    .ih-sub{color:#64748B;font-size:13px;margin-top:8px;line-height:1.5;}
    .ih-equiv{display:inline-flex;align-items:center;gap:6px;background:rgba(2,195,154,0.1);border:1px solid rgba(2,195,154,0.2);border-radius:99px;padding:5px 14px;font-size:12px;color:#02C39A;font-weight:600;margin-top:12px;}

    /* STATS GRID */
    .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
    .stat-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:18px;padding:18px;position:relative;overflow:hidden;}
    .stat-card::after{position:absolute;right:12px;bottom:8px;font-size:32px;opacity:0.12;}
    .sc-trips::after{content:'🚌';}
    .sc-km::after{content:'📍';}
    .sc-credits::after{content:'⚡';}
    .sc-rupees::after{content:'₹';}
    .stat-icon{font-size:20px;margin-bottom:8px;}
    .stat-val{font-size:28px;font-weight:900;color:#fff;letter-spacing:-1px;line-height:1;}
    .stat-lbl{font-size:11px;color:#64748B;margin-top:4px;}
    .stat-val.green{color:#02C39A;}

    /* SECTION LABEL */
    .sec-lbl{font-size:12px;font-weight:600;color:#9ECFCC;letter-spacing:0.5px;margin-bottom:12px;margin-top:4px;}

    /* TRANSPORT BREAKDOWN */
    .breakdown-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:18px;padding:20px;margin-bottom:16px;}
    .bd-title{font-size:14px;font-weight:700;margin-bottom:16px;}
    .bd-row{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
    .bd-row:last-child{margin-bottom:0;}
    .bd-icon{font-size:20px;width:32px;text-align:center;flex-shrink:0;}
    .bd-info{flex:1;}
    .bd-name{font-size:12px;font-weight:600;color:#fff;margin-bottom:4px;}
    .bd-bar-wrap{background:rgba(255,255,255,0.06);border-radius:99px;height:6px;overflow:hidden;}
    .bd-bar{height:100%;border-radius:99px;background:linear-gradient(90deg,#028090,#02C39A);transition:width 1s ease;}
    .bd-val{font-size:12px;font-weight:700;color:#02C39A;flex-shrink:0;min-width:36px;text-align:right;}

    /* CO2 EQUIVALENTS */
    .equiv-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
    .equiv-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:14px;text-align:center;}
    .eq-icon{font-size:28px;margin-bottom:6px;}
    .eq-val{font-size:16px;font-weight:800;color:#02C39A;margin-bottom:2px;}
    .eq-lbl{font-size:10px;color:#64748B;line-height:1.4;}

    /* LEADERBOARD */
    .leaderboard-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:18px;padding:20px;margin-bottom:16px;}
    .lb-title{font-size:14px;font-weight:700;margin-bottom:4px;}
    .lb-sub{font-size:11px;color:#64748B;margin-bottom:16px;}
    .lb-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.05);}
    .lb-row:last-child{border-bottom:none;}
    .lb-row.you{background:rgba(2,195,154,0.06);border-radius:12px;padding:10px 12px;border-bottom:none;margin:4px -8px;}
    .lb-rank{font-size:16px;font-weight:900;color:#64748B;width:24px;text-align:center;flex-shrink:0;}
    .lb-rank.gold{color:#F59E0B;}
    .lb-rank.silver{color:#94A3B8;}
    .lb-rank.bronze{color:#CD7C2F;}
    .lb-avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0;}
    .lb-info{flex:1;}
    .lb-name{font-size:13px;font-weight:700;color:#fff;}
    .lb-city{font-size:10px;color:#64748B;margin-top:1px;}
    .lb-credits{font-size:14px;font-weight:800;color:#02C39A;}
    .lb-co2{font-size:10px;color:#64748B;text-align:right;margin-top:1px;}
    .you-badge{background:rgba(2,195,154,0.15);border:1px solid rgba(2,195,154,0.3);border-radius:99px;padding:2px 8px;font-size:9px;font-weight:700;color:#02C39A;margin-left:6px;}

    /* STREAK / BADGES */
    .badges-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:18px;padding:20px;margin-bottom:16px;}
    .badges-title{font-size:14px;font-weight:700;margin-bottom:14px;}
    .badges-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
    .badge-item{text-align:center;}
    .badge-icon{font-size:28px;margin-bottom:4px;filter:grayscale(1);opacity:0.3;transition:all 0.3s;}
    .badge-icon.earned{filter:grayscale(0);opacity:1;}
    .badge-name{font-size:9px;color:#64748B;line-height:1.3;}
    .badge-name.earned{color:#02C39A;}

    /* EMPTY STATE */
    .empty-impact{text-align:center;padding:40px 20px;}
    .ei-icon{font-size:56px;margin-bottom:14px;}
    .ei-title{font-size:16px;font-weight:700;color:#9ECFCC;margin-bottom:6px;}
    .ei-desc{font-size:13px;color:#64748B;line-height:1.6;margin-bottom:20px;}
    .ei-btn{display:inline-block;background:linear-gradient(135deg,#028090,#02C39A);color:#0A2640;font-size:14px;font-weight:800;padding:12px 28px;border-radius:12px;text-decoration:none;}

    /* SHARE CARD */
    .share-card{background:linear-gradient(135deg,#0f3460,#012a1e);border:1px solid rgba(2,195,154,0.2);border-radius:18px;padding:20px;margin-bottom:16px;text-align:center;}
    .share-title{font-size:14px;font-weight:700;margin-bottom:4px;}
    .share-sub{font-size:12px;color:#64748B;margin-bottom:14px;}
    .share-btn{display:inline-flex;align-items:center;gap:8px;background:rgba(2,195,154,0.12);border:1px solid rgba(2,195,154,0.3);border-radius:12px;padding:10px 20px;color:#02C39A;font-size:13px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;transition:background 0.2s;}
    .share-btn:hover{background:rgba(2,195,154,0.2);}

    /* BOTTOM NAV */
    .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(10,38,64,0.97);border-top:1px solid rgba(255,255,255,0.06);display:flex;justify-content:space-around;padding:10px 0 16px;z-index:50;backdrop-filter:blur(12px);}
    .bn-item{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;color:#64748B;text-decoration:none;padding:4px 12px;border-radius:12px;transition:color 0.2s;}
    .bn-item .bn-icon{font-size:22px;}
    .bn-item.active,.bn-item:hover{color:#02C39A;}

    /* Toast */
    .toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#02C39A;color:#0A2640;font-size:13px;font-weight:700;padding:10px 20px;border-radius:99px;z-index:300;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap;}
    .toast.show{opacity:1;}
  </style>
</head>
<body>

  <nav class="navbar">
    <a class="nav-logo" href="../index.html">
      <div class="nav-logo-icon">🌿</div>
      <div class="nav-logo-text">Green<span>Karma</span></div>
    </a>
    <div style="display:flex;align-items:center;gap:10px;">
      <div class="nav-credits-pill" id="navCredits">⚡ 0 credits</div>
      <div class="nav-avatar" id="navAvatar">?</div>
    </div>
  </nav>

  <div class="page">
    <div class="page-title">My Impact 🌍</div>
    <div class="page-sub" id="pageSub">Here's what your green commutes have achieved</div>

    <!-- CONTENT injected by JS -->
    <div id="mainContent"></div>
  </div>

  <div class="toast" id="toast"></div>

  <!-- BOTTOM NAV -->
  <div class="bottom-nav">
    <a class="bn-item" href="trip.html"><span class="bn-icon">🚌</span>Trip</a>
    <a class="bn-item" href="wallet.html"><span class="bn-icon">💳</span>Wallet</a>
    <a class="bn-item" href="redeem.html"><span class="bn-icon">🎁</span>Redeem</a>
    <a class="bn-item active" href="dashboard.html"><span class="bn-icon">📊</span>Impact</a>
    <a class="bn-item" href="profile.html"><span class="bn-icon">👤</span>Profile</a>
  </div>

<script>
  // ── Load user ──
  let user;
  try { user = JSON.parse(localStorage.getItem('gk_user') || 'null'); } catch(e){ user=null; }
  if(!user || !user.name){ window.location.href = '../index.html'; }

  user.credits      = user.credits      || 0;
  user.co2          = user.co2          || 0;
  user.trips        = user.trips        || 0;
  user.transactions = user.transactions || [];

  // Nav
  document.getElementById('navAvatar').textContent  = (user.name||'U')[0].toUpperCase();
  document.getElementById('navCredits').textContent = '⚡ ' + user.credits.toFixed(1) + ' credits';

  const txs       = user.transactions;
  const earnTxs   = txs.filter(t => t.type === 'earn');
  const totalKm   = earnTxs.reduce((s,t) => s + (t.km||0), 0);
  const totalCo2  = user.co2 || 0;
  const totalCred = user.credits || 0;
  const hasTrips  = user.trips > 0;

  // ── Transport breakdown from transaction history ──
  const transportMap = {};
  earnTxs.forEach(t => {
    const key = t.name ? t.name.split('·')[0].trim() : 'Unknown';
    if(!transportMap[key]) transportMap[key] = { km:0, trips:0, icon: t.icon||'🚌' };
    transportMap[key].km     += (t.km||0);
    transportMap[key].trips  += 1;
  });
  const maxKm = Math.max(...Object.values(transportMap).map(v=>v.km), 0.01);

  // ── Leaderboard (simulated city peers + user injected at real position) ──
  const AVATARS = ['#F97316','#8B5CF6','#06B6D4','#EC4899','#10B981','#F59E0B','#EF4444','#6366F1'];
  const cityPeers = [
    { name:'Priya S.',   city: user.city||'Chennai', credits:48.2, co2:9.6,  avatar:'P', color:AVATARS[0] },
    { name:'Rahul M.',   city: user.city||'Chennai', credits:41.5, co2:8.3,  avatar:'R', color:AVATARS[1] },
    { name:'Ananya K.',  city: user.city||'Chennai', credits:36.0, co2:7.2,  avatar:'A', color:AVATARS[2] },
    { name:'Vikram T.',  city: user.city||'Chennai', credits:29.1, co2:5.8,  avatar:'V', color:AVATARS[3] },
    { name:'Sneha R.',   city: user.city||'Chennai', credits:18.4, co2:3.7,  avatar:'S', color:AVATARS[4] },
    { name:'Karan P.',   city: user.city||'Chennai', credits:12.0, co2:2.4,  avatar:'K', color:AVATARS[5] },
    { name:'Divya N.',   city: user.city||'Chennai', credits: 7.5, co2:1.5,  avatar:'D', color:AVATARS[6] },
  ];

  // Insert user into leaderboard at correct position
  const allPlayers = [...cityPeers, {
    name: user.name, city: user.city||'–',
    credits: totalCred, co2: totalCo2,
    avatar: (user.name||'U')[0].toUpperCase(),
    color: '#02C39A', isYou: true
  }].sort((a,b) => b.credits - a.credits);

  const userRank = allPlayers.findIndex(p => p.isYou) + 1;

  // ── Badges ──
  const BADGES = [
    { icon:'🌱', name:'First Trip',     earned: user.trips >= 1  },
    { icon:'🚌', name:'5 Trips',        earned: user.trips >= 5  },
    { icon:'🌿', name:'5 kg CO₂ saved', earned: totalCo2 >= 5   },
    { icon:'⚡', name:'25 Credits',     earned: totalCred >= 25  },
    { icon:'🚲', name:'Cyclist',        earned: earnTxs.some(t=>t.name&&t.name.includes('Cycle')) },
    { icon:'🏆', name:'Top 3',          earned: userRank <= 3    },
    { icon:'🌍', name:'10 kg CO₂',      earned: totalCo2 >= 10  },
    { icon:'💎', name:'50 Credits',     earned: totalCred >= 50  },
  ];

  // ── CO2 equivalents ──
  const trees    = (totalCo2 / 21).toFixed(1);   // avg tree absorbs ~21kg CO2/yr
  const phones   = Math.round(totalCo2 / 0.007); // ~7g CO2 per phone charge
  const km_car   = Math.round(totalCo2 / 0.12);  // ~120g CO2/km for avg car
  const cups     = Math.round(totalCo2 / 0.21);  // ~210g CO2 per cup of coffee

  // ── Render ──
  const content = document.getElementById('mainContent');

  if(!hasTrips){
    content.innerHTML = `
      <div class="empty-impact">
        <div class="ei-icon">🌱</div>
        <div class="ei-title">No impact data yet</div>
        <div class="ei-desc">
          Log your first GPS-verified trip to start building your green impact story.
          Every bus ride, metro journey, and cycle counts!
        </div>
        <a class="ei-btn" href="trip.html">Log My First Trip →</a>
      </div>`;
    return;
  }

  // Full dashboard
  content.innerHTML = `

    <!-- HERO CO2 CARD -->
    <div class="impact-hero">
      <div class="ih-label">TOTAL CO₂ SAVED VS DRIVING</div>
      <div class="ih-big">${totalCo2.toFixed(2)}<span class="ih-unit"> kg</span></div>
      <div class="ih-sub">Across ${user.trips} trip${user.trips!==1?'s':''} · ${totalKm.toFixed(1)} km of green travel</div>
      <div class="ih-equiv">🌳 Equivalent to planting ${trees} trees</div>
    </div>

    <!-- STATS GRID -->
    <div class="stats-grid">
      <div class="stat-card sc-trips">
        <div class="stat-icon">🚌</div>
        <div class="stat-val">${user.trips}</div>
        <div class="stat-lbl">Green trips taken</div>
      </div>
      <div class="stat-card sc-km">
        <div class="stat-icon">📍</div>
        <div class="stat-val">${totalKm.toFixed(1)}</div>
        <div class="stat-lbl">Kilometres travelled</div>
      </div>
      <div class="stat-card sc-credits">
        <div class="stat-icon">⚡</div>
        <div class="stat-val green">${totalCred.toFixed(1)}</div>
        <div class="stat-lbl">Credits in wallet</div>
      </div>
      <div class="stat-card sc-rupees">
        <div class="stat-icon">💰</div>
        <div class="stat-val">₹${Math.round(totalCred*5)}</div>
        <div class="stat-lbl">Redeemable value</div>
      </div>
    </div>

    <!-- TRANSPORT BREAKDOWN -->
    ${Object.keys(transportMap).length > 0 ? `
    <div class="sec-lbl">TRAVEL BREAKDOWN</div>
    <div class="breakdown-card">
      <div class="bd-title">Distance by transport type</div>
      ${Object.entries(transportMap).map(([name, data]) => `
        <div class="bd-row">
          <div class="bd-icon">${data.icon}</div>
          <div class="bd-info">
            <div class="bd-name">${name} · ${data.trips} trip${data.trips!==1?'s':''}</div>
            <div class="bd-bar-wrap">
              <div class="bd-bar" style="width:${Math.round((data.km/maxKm)*100)}%"></div>
            </div>
          </div>
          <div class="bd-val">${data.km.toFixed(1)}km</div>
        </div>
      `).join('')}
    </div>
    ` : ''}

    <!-- CO2 EQUIVALENTS -->
    <div class="sec-lbl">YOUR ${totalCo2.toFixed(2)} KG CO₂ SAVED IS LIKE…</div>
    <div class="equiv-grid">
      <div class="equiv-card">
        <div class="eq-icon">🌳</div>
        <div class="eq-val">${trees} trees</div>
        <div class="eq-lbl">planted for a year</div>
      </div>
      <div class="equiv-card">
        <div class="eq-icon">📱</div>
        <div class="eq-val">${phones}</div>
        <div class="eq-lbl">phone charges avoided</div>
      </div>
      <div class="equiv-card">
        <div class="eq-icon">🚗</div>
        <div class="eq-val">${km_car} km</div>
        <div class="eq-lbl">of car driving offset</div>
      </div>
      <div class="equiv-card">
        <div class="eq-icon">☕</div>
        <div class="eq-val">${cups}</div>
        <div class="eq-lbl">cups of coffee equiv.</div>
      </div>
    </div>

    <!-- BADGES -->
    <div class="sec-lbl">ACHIEVEMENTS</div>
    <div class="badges-card">
      <div class="badges-title">Your badges</div>
      <div class="badges-grid">
        ${BADGES.map(b => `
          <div class="badge-item">
            <div class="badge-icon ${b.earned?'earned':''}">${b.icon}</div>
            <div class="badge-name ${b.earned?'earned':''}">${b.name}</div>
          </div>
        `).join('')}
      </div>
    </div>

    <!-- LEADERBOARD -->
    <div class="sec-lbl">CITY LEADERBOARD · ${(user.city||'YOUR CITY').toUpperCase()}</div>
    <div class="leaderboard-card">
      <div class="lb-title">Top green commuters near you</div>
      <div class="lb-sub">Your rank: #${userRank} of ${allPlayers.length} commuters</div>
      ${allPlayers.slice(0, 8).map((p, i) => {
        const rank = i + 1;
        const rankClass = rank===1?'gold':rank===2?'silver':rank===3?'bronze':'';
        return `
        <div class="lb-row ${p.isYou?'you':''}">
          <div class="lb-rank ${rankClass}">${rank===1?'🥇':rank===2?'🥈':rank===3?'🥉':'#'+rank}</div>
          <div class="lb-avatar" style="background:${p.color}">${p.avatar}</div>
          <div class="lb-info">
            <div class="lb-name">${p.name}${p.isYou?'<span class="you-badge">YOU</span>':''}</div>
            <div class="lb-city">${p.city}</div>
          </div>
          <div style="text-align:right">
            <div class="lb-credits">⚡ ${p.credits.toFixed(1)}</div>
            <div class="lb-co2">${p.co2.toFixed(1)} kg CO₂</div>
          </div>
        </div>`;
      }).join('')}
    </div>

    <!-- SHARE -->
    <div class="share-card">
      <div class="share-title">Share your impact 🌍</div>
      <div class="share-sub">Let others know you're commuting green</div>
      <button class="share-btn" onclick="shareImpact()">
        📤 Share My Impact Stats
      </button>
    </div>
  `;

  // Animate bars after render
  setTimeout(() => {
    document.querySelectorAll('.bd-bar').forEach(bar => {
      const w = bar.style.width;
      bar.style.width = '0%';
      setTimeout(() => { bar.style.width = w; }, 50);
    });
  }, 100);

  // Share
  function shareImpact(){
    const text = `I've saved ${totalCo2.toFixed(2)} kg of CO₂ by taking green transport! 🌿\n${user.trips} trips · ${totalKm.toFixed(1)} km · ⚡ ${totalCred.toFixed(1)} GreenKarma credits earned.\n\nJoin me on GreenKarma! #GreenKarma #EcoCommute`;
    if(navigator.share){
      navigator.share({ title:'My GreenKarma Impact', text });
    } else {
      navigator.clipboard.writeText(text).then(() => showToast('📋 Copied to clipboard!'));
    }
  }

  function showToast(msg){
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }
</script>
</body>
</html>
